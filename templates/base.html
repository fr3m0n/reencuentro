<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reencuentro 1977</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@300;400&display=swap"
        rel="stylesheet">
    <!-- Iconos para el menú y música -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link rel="icon" type="image/png" href="/static/favicon.png">
</head>

<!-- Botón volver arriba -->
<button onclick="topFunction()" id="myBtn" title="Ir arriba">↑</button>

<body>

    <!-- MENÚ -->
    <nav class="menu-navegacion">
        <div class="contenedor-menu">
            <a href="/" class="logo">Promoción 1977</a>

            <!-- BOTÓN MÓVIL -->
            <div class="menu-movil-btn" onclick="toggleMenu()">
                <i class="fas fa-bars"></i>
            </div>

            <ul class="enlaces" id="menuEnlaces">
                <li><a href="/">Inicio</a></li>
                <li><a href="/evento">El Evento</a></li>
                <li><a href="/galeria">Galería</a></li>
                <li><a href="/inscripcion" class="btn-menu">Inscribirse</a></li>
            </ul>
        </div>
    </nav>

    <!-- CONTENIDO -->
    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- FOOTER -->
    <footer class="pie-pagina">
        <p>50 Aniversario - Promoción 1977</p>
    </footer>

    <!-- MÚSICA -->
    <audio id="player" loop>
        <source src="https://stream.zeno.fm/atswxk87na0uv" type="audio/mpeg">
    </audio>
    <div id="music-btn" onclick="toggleMusic()">
        <i id="icon-music" class="fas fa-music"></i>
    </div>

    <!-- SCRIPTS IMPORTANTES -->
    <script>
        // --- FUNCIÓN PARA EL MENÚ MÓVIL ---
        function toggleMenu() {
            const menu = document.getElementById('menuEnlaces');
            menu.classList.toggle('activo');
        }

        // --- FUNCIÓN PARA LA MÚSICA ---
        var audio = document.getElementById("player");
        var btn = document.getElementById("music-btn");
        var icon = document.getElementById("icon-music");

        function toggleMusic() {
            if (audio.paused) {
                audio.play();
                icon.className = "fas fa-pause";
                btn.classList.add("playing");
            } else {
                audio.pause();
                icon.className = "fas fa-music";
                btn.classList.remove("playing");
            }
        }
    // Obtener el botón
    let mybutton = document.getElementById("myBtn");

    // Cuando el usuario baja 20px, muestra el botón
    window.onscroll = function () { scrollFunction() };

    function scrollFunction() {
        if (document.body.scrollTop > 20 || document.documentElement.scrollTop > 20) {
            mybutton.style.display = "block";
        } else {
            mybutton.style.display = "none";
        }
    }

    // Cuando hace clic, sube
    function topFunction() {
        document.body.scrollTop = 0;
        document.documentElement.scrollTop = 0;
    }
    </script>

</body>

</html>
