{% extends "base.html" %}

{% block content %}
<section class="hero-principal">
    <div class="capa-oscura"></div>
    <div class="contenido-hero">
        <span class="subtitulo">INVITACIÓN ESPECIAL</span>
        <!-- CAMBIO: Título principal -->
        <h1>Bodas de Oro</h1>
        <p>50 años de una amistad que trasciende el tiempo</p>
        <div class="contador">
            <div><span id="dias">--</span><small>Días</small></div>
            <div><span id="horas">--</span><small>Horas</small></div>
            <div><span id="minutos">--</span><small>Min</small></div>
        </div>
        <a href="/evento" class="btn-principal">Ver Detalles</a>
    </div>
</section>

<script>
    // CAMBIO: Pon aquí la fecha exacta de tu evento (Año, Mes, Día, Hora)
    // Recuerda: En JavaScript los meses van de 0 (Enero) a 11 (Diciembre)
    // Ejemplo para 04 de Septiembre de 2027 a las 9:00 AM -> new Date("Sep 4, 2027 09:00:00")
    const fechaEvento = new Date("Sep 4, 2027 09:00:00").getTime();

    const x = setInterval(function () {
        const now = new Date().getTime();
        const dist = fechaEvento - now;
        document.getElementById("dias").innerText = Math.floor(dist / (1000 * 60 * 60 * 24));
        document.getElementById("horas").innerText = Math.floor((dist % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        document.getElementById("minutos").innerText = Math.floor((dist % (1000 * 60 * 60)) / (1000 * 60));
    }, 1000);
</script>
{% endblock %}
