{% extends "base.html" %}

{% block content %}
<section class="pagina-galeria">
    <div class="encabezado-pagina">
        <h2>Galería de Recuerdos</h2>
        <p>Álbum fotográfico y de videos de la Promoción 1977.</p>
    </div>

    <!-- Contenedor dinámico -->
    <div id="grid-fotos" class="grid-galeria">
        <p class="mensaje-carga">Cargando álbum...</p>
    </div>

    <!-- Botón para cargar más (SIN style inline) -->
    <div class="contenedor-cargar-mas">
        <button id="btnCargarMas" class="btn-principal" onclick="cargarMasFotos()">
            Cargar más fotos
        </button>
    </div>

</section>

<!-- ESTRUCTURA DEL MODAL (Lightbox) -->
<div id="miModal" class="modal">
    <!-- Corregido: Agregado title y role para accesibilidad -->
    <span class="cerrar" onclick="cerrarModal()" title="Cerrar imagen" role="button" tabindex="0">&times;</span>
    <!-- Corregido: Agregado alt a la imagen del modal -->
    <img class="modal-contenido" id="imgModal" alt="Imagen ampliada de la galería">
    <div id="caption"></div>
</div>

<!-- SCRIPT -->
<script>
    const API_KEY = '{{ api_key }}';
    const FOLDER_ID = '{{ folder_id }}';

    let nextPageToken = null;

    async function cargarFotos(token = null) {
        try {
            let url = `https://www.googleapis.com/drive/v3/files?q='${FOLDER_ID}'+in+parents&key=${API_KEY}&fields=nextPageToken,files(id,name,mimeType,thumbnailLink)&pageSize=20`;
            if (token) {
                url += `&pageToken=${token}`;
            }

            const respuesta = await fetch(url);

            if (!respuesta.ok) throw new Error(`Error HTTP: ${respuesta.status}`);

            const datos = await respuesta.json();
            const contenedor = document.getElementById('grid-fotos');

            if (!token) contenedor.innerHTML = '';

            if (datos.files && datos.files.length > 0) {
                datos.files.forEach(archivo => {
                    const item = document.createElement('div');
                    item.className = 'item-galeria';

                    // SI ES IMAGEN
                    if (archivo.mimeType.startsWith('image/')) {
                        const img = document.createElement('img');
                        img.alt = archivo.name || 'Foto de la galería'; // Alt dinámico

                        if (archivo.thumbnailLink) {
                            img.src = archivo.thumbnailLink;
                        } else {
                            img.src = `https://drive.google.com/uc?export=view&id=${archivo.id}`;
                        }

                        img.loading = 'lazy';
                        img.style.cursor = 'pointer';

                        img.onclick = function () {
                            abrirModal(
                                `https://drive.google.com/uc?export=view&id=${archivo.id}`,
                                archivo.name
                            );
                        };

                        item.appendChild(img);
                    }
                    // SI ES VIDEO MP4
                    else if (archivo.mimeType === 'video/mp4') {
                        const iframe = document.createElement('iframe');
                        iframe.src = `https://drive.google.com/file/d/${archivo.id}/preview`;
                        iframe.loading = 'lazy';
                        iframe.allow = "autoplay";
                        iframe.title = archivo.name || "Video"; // Title para iframe

                        item.appendChild(iframe);
                    }

                    contenedor.appendChild(item);
                });
            }

            // Lógica del botón "Cargar más"
            if (datos.nextPageToken) {
                nextPageToken = datos.nextPageToken;
                document.getElementById('btnCargarMas').style.display = 'inline-block';
            } else {
                document.getElementById('btnCargarMas').style.display = 'none';
                if (!token && (!datos.files || datos.files.length === 0)) {
                    contenedor.innerHTML = '<p class="mensaje-carga">No se encontraron archivos.</p>';
                }
            }

        } catch (error) {
            console.error('Error detallado:', error);
            document.getElementById('grid-fotos').innerHTML = '<p class="mensaje-error">Error al cargar.</p>';
        }
    }

    function cargarMasFotos() {
        if (nextPageToken) cargarFotos(nextPageToken);
    }

    // --- FUNCIONES DEL MODAL ---

    function abrirModal(src, nombre) {
        const modal = document.getElementById('miModal');
        const modalImg = document.getElementById('imgModal');
        const captionText = document.getElementById('caption');

        modal.style.display = "block";
        modalImg.src = src;
        captionText.innerHTML = nombre;
    }

    function cerrarModal() {
        document.getElementById('miModal').style.display = "none";
    }

    // Cerrar modal con tecla ESC
    document.addEventListener('keydown', function (e) {
        if (e.key === "Escape") cerrarModal();
    });

    // Cargar inicio
    cargarFotos();
</script>

{% endblock %}
