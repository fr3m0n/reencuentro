<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <!-- Corrección: Agregamos el viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Lista Inscritos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">
    <h1>Panel de Administración</h1>
    <p>Total de inscritos listados abajo.</p>
    <a href="/" class="btn btn-secondary mb-3">Volver al Inicio</a>

    <table class="table table-striped">
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Email</th>
                <th>Teléfono</th>
                <th>Asistencia</th>
                <th>Mensaje</th>
            </tr>
        </thead>
        <tbody>
            {% for persona in inscritos %}
            <tr>
                <td>{{ persona.nombre }}</td>
                <td>{{ persona.email }}</td>
                <td>{{ persona.telefono }}</td>
                <td>{{ persona.asistencia }}</td>
                <td>{{ persona.mensaje }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>

</html>
