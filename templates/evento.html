{% extends "base.html" %}

{% block content %}
<section class="pagina-evento">
    <div class="encabezado-pagina">
        <h2>Detalles del Encuentro</h2>
        <p>Te esperamos para revivir aquellos momentos inolvidables.</p>
    </div>

    <div class="tarjeta-info">
        <!-- Solo Fecha -->
        <div class="fila-info">
            <div class="icono-grande">
                <iconify-icon icon="mdi:calendar-month"></iconify-icon>
            </div>
            <div>
                <h3>Fecha y Hora</h3>
                <p>04 de Septiembre, 2027</p>
                <p>09:00 Horas</p>
            </div>
        </div>

        <!-- MAPA -->
        <div class="mapa-contenedor">
                    <!-- MAPA CORREGIDO -->
                    <div class="mapa-contenedor">
                        <iframe
                            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3976.123456!2d-74.08!3d4.60!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zNMKwMzYnMDAuMCJOIDc0wrAwNCc0OC4wIlc!5e0!3m2!1ses!2sco!4v1234567890"
                            width="100%" height="300" style="border:0; border-radius: 10px;" allowfullscreen="" loading="lazy"
                            title="Ubicación del evento en el mapa">
                        </iframe>
                    </div>
        </div>
        <!-- Texto sin estilos inline, ahora usa una clase -->
        <p class="texto-ubicacion">Colegio San José Obrero - Salón Principal</p>

        <div class="vestimenta">
            <h4>Vestimenta</h4>
            <p>Sport Elegante</p>
        </div>
    </div>
</section>
{% endblock %}
